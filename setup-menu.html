window.uploadMenu = async function() {
  const btn = document.getElementById('startBtn');
  const log = document.getElementById('log');
  const done = document.getElementById('done');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  
  log.innerHTML = '<div class="log-info">Starting upload...</div>';
  
  // First, clear existing menu items
  log.innerHTML += '<div class="log-info">Clearing old menu items...</div>';
  try {
    const existing = await getDocs(collection(db, 'menu'));
    let delCount = 0;
    for (const d of existing.docs) {
      await deleteDoc(doc(db, 'menu', d.id));
      delCount++;
    }
    log.innerHTML += '<div class="log-ok">Cleared ' + delCount + ' old items</div>';
  } catch(e) {
    log.innerHTML += '<div class="log-err">Clear error: ' + e.message + '</div>';
  }
  
  // Upload new items
  let ok = 0, fail = 0;
  for (let i = 0; i < MENU_DATA.length; i++) {
    const item = MENU_DATA[i];
    try {
      await addDoc(collection(db, 'menu'), {
        name: item.name,
        price: item.price,
        description: item.description || '',
        category: item.category,
        badge: item.badge || '',
        image: item.image || ''
      });
      ok++;
      if (ok % 20 === 0 || i === MENU_DATA.length - 1) {
        log.innerHTML += '<div class="log-ok">Uploaded ' + ok + '/' + MENU_DATA.length + '</div>';
      }
    } catch(e) {
      fail++;
      log.innerHTML += '<div class="log-err">Error: ' + item.name + ' - ' + e.message + '</div>';
    }
  }
  
  log.innerHTML += '<div class="log-ok"><strong>Done! ' + ok + ' items uploaded, ' + fail + ' errors</strong></div>';
  btn.textContent = 'Complete!';
  done.style.display = 'block';
};
