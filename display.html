<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj Mahal — Écran Cuisine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFFDD0;
  --cream2: #FFF8B0;
  --garnet: #9B111E;
  --garnet-dark: #6B0A14;
  --garnet-light: #C41E3A;
  --orange: #CC5500;
  --orange-light: #E8651A;
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: rgba(201,168,76,0.4);
  --ready-green: #228B22;
  --ready-bg: rgba(34,139,34,0.12);
  --preparing-bg: rgba(204,85,0,0.12);
  --pending-bg: rgba(201,168,76,0.12);
  --text: #3D1507;
  --text-muted: #8B5A3C;
  --border: rgba(201,168,76,0.2);
  --shadow: rgba(155,17,30,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--cream); }
body { font-family:'Lato',sans-serif; color:var(--text); }

/* Background pattern */
.bg-pattern {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(155,17,30,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(204,85,0,0.06) 0%, transparent 50%),
    repeating-linear-gradient(45deg, rgba(201,168,76,0.03) 0, rgba(201,168,76,0.03) 1px, transparent 0, transparent 50%);
  background-size: auto, auto, 28px 28px;
}

/* ── HEADER ── */
header {
  position:relative; z-index:10;
  background:var(--garnet);
  border-bottom:3px solid var(--gold);
  padding:0 32px; height:90px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 4px 30px rgba(155,17,30,0.3);
}
.header-brand { display:flex; align-items:center; gap:16px; }
.header-logo {
  width:62px; height:62px; border-radius:50%;
  background:white; padding:6px;
  border:2px solid var(--gold);
  box-shadow:0 0 20px rgba(201,168,76,0.4);
  object-fit:contain;
  animation:logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse { 0%,100%{box-shadow:0 0 20px rgba(201,168,76,0.4);} 50%{box-shadow:0 0 35px rgba(201,168,76,0.7);} }
.brand-text h1 { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--gold-light); letter-spacing:0.12em; }
.brand-text p { font-size:10px; letter-spacing:4px; color:rgba(255,220,180,0.7); margin-top:2px; text-transform:uppercase; }

.header-center { text-align:center; }
.live-badge {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(201,168,76,0.15); border:1px solid var(--gold-dim);
  border-radius:50px; padding:6px 16px; margin-bottom:6px;
}
.live-dot { width:8px; height:8px; border-radius:50%; background:#22C55E; box-shadow:0 0 10px #22C55E; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.live-text { font-size:10px; letter-spacing:3px; color:var(--gold-light); font-weight:700; text-transform:uppercase; }

.header-stats { display:flex; gap:20px; justify-content:center; }
.stat-pill { display:flex; align-items:center; gap:6px; }
.stat-dot { width:8px; height:8px; border-radius:50%; }
.stat-pill.pend .stat-dot { background:var(--gold); box-shadow:0 0 8px var(--gold); }
.stat-pill.prep .stat-dot { background:var(--orange); box-shadow:0 0 8px var(--orange); }
.stat-pill.redy .stat-dot { background:var(--ready-green); box-shadow:0 0 8px var(--ready-green); }
.stat-num { font-size:18px; font-weight:900; line-height:1; }
.stat-pill.pend .stat-num { color:var(--gold); }
.stat-pill.prep .stat-num { color:var(--orange); }
.stat-pill.redy .stat-num { color:var(--ready-green); }
.stat-label { font-size:9px; letter-spacing:2px; color:rgba(255,220,180,0.6); text-transform:uppercase; font-weight:600; }

.header-right { text-align:right; }
.fb-status {
  display:flex; align-items:center; gap:6px; margin-bottom:4px;
  justify-content:flex-end;
}
.fb-dot { width:8px; height:8px; border-radius:50%; }
.fb-dot.ok { background:#22C55E; box-shadow:0 0 10px #22C55E; }
.fb-dot.err { background:#EF4444; box-shadow:0 0 10px #EF4444; }
.fb-dot.wait { background:#EAB308; box-shadow:0 0 10px #EAB308; animation:pulse 1s ease-in-out infinite; }
.fb-label { font-size:9px; letter-spacing:2px; color:rgba(255,220,180,0.8); text-transform:uppercase; }
.clock { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:700; color:var(--gold-light); letter-spacing:2px; line-height:1; }
.date-line { font-size:10px; letter-spacing:2px; color:rgba(255,220,180,0.6); margin-top:4px; text-transform:uppercase; }

/* ── WAITER ALERT BANNER ── */
.waiter-alert {
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:linear-gradient(135deg, var(--garnet), var(--orange));
  color:white; padding:18px 32px;
  display:flex; align-items:center; justify-content:center; gap:16px;
  transform:translateY(-100%);
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 40px rgba(155,17,30,0.5);
  border-bottom:3px solid var(--gold-light);
}
.waiter-alert.show { transform:translateY(0); }
.waiter-icon { font-size:2rem; animation:bellRing 0.5s ease-in-out infinite; }
@keyframes bellRing { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-15deg);} 75%{transform:rotate(15deg);} }
.waiter-text h3 { font-family:'Playfair Display',serif; font-size:1.4rem; }
.waiter-text p { font-size:0.85rem; opacity:0.85; letter-spacing:2px; }

/* ── NEW ORDER TOAST ── */
.new-order-toast {
  position:fixed; top:100px; right:24px; z-index:150;
  background:var(--garnet); color:white;
  border:1px solid var(--gold); border-radius:12px;
  padding:14px 20px;
  display:flex; align-items:center; gap:12px;
  transform:translateX(120%);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 30px rgba(155,17,30,0.4);
  max-width:280px;
}
.new-order-toast.show { transform:translateX(0); }
.toast-icon { font-size:1.5rem; }
.toast-text strong { display:block; font-family:'Playfair Display',serif; font-size:1rem; color:var(--gold-light); }
.toast-text span { font-size:0.75rem; opacity:0.8; letter-spacing:1px; }

/* ── MAIN ORDERS AREA ── */
.orders-wrapper {
  position:relative; z-index:5;
  height:calc(100vh - 90px);
  overflow-y:auto;
  padding:20px 30px;
  scrollbar-width:thin;
  scrollbar-color: var(--gold-dim) transparent;
}
.orders-wrapper::-webkit-scrollbar { width:6px; }
.orders-wrapper::-webkit-scrollbar-track { background:transparent; }
.orders-wrapper::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:3px; }

/* Section headers */
.section-header {
  display:flex; align-items:center; gap:14px;
  padding:14px 24px; border-radius:14px;
  margin-bottom:16px; margin-top:8px;
}
.section-pending { background:rgba(201,168,76,0.08); border:2px solid rgba(201,168,76,0.2); }
.section-kitchen { background:rgba(204,85,0,0.08); border:2px solid rgba(204,85,0,0.2); }
.section-ready { background:rgba(22,101,52,0.06); border:2px solid rgba(22,101,52,0.2); }
.section-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.section-pending .section-dot { background:var(--gold); box-shadow:0 0 14px var(--gold); }
.section-kitchen .section-dot { background:var(--orange); box-shadow:0 0 14px var(--orange); }
.section-ready .section-dot { background:#166534; box-shadow:0 0 14px #166534; }
.section-name { font-size:13px; font-weight:900; letter-spacing:4px; text-transform:uppercase; }
.section-pending .section-name { color:var(--gold); }
.section-kitchen .section-name { color:var(--orange); }
.section-ready .section-name { color:#166534; }
.section-cnt { margin-left:auto; font-size:12px; color:#888; letter-spacing:2px; }

/* Cards grid */
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:16px; margin-bottom:24px;
}

/* ── ORDER CARD ── */
.order-card {
  background:white; border-radius:16px; padding:18px;
  border:1px solid var(--border);
  box-shadow:0 2px 16px var(--shadow);
  transition:all 0.3s ease;
  animation:slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position:relative; overflow:hidden;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-20px) scale(0.96);} to{opacity:1;transform:translateY(0) scale(1);} }

.order-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.order-card.status-pending::before { background:linear-gradient(90deg, var(--gold), var(--orange)); }
.order-card.status-preparing::before { background:linear-gradient(90deg, var(--orange), var(--gold)); }
.order-card.status-ready::before { background:linear-gradient(90deg, var(--ready-green), var(--gold)); }

.order-card.new-flash { animation:slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1), goldGlow 3s ease-out; }
@keyframes goldGlow { 0%{box-shadow:0 0 0 3px rgba(201,168,76,0.8);} 100%{box-shadow:0 2px 16px var(--shadow);} }

/* ── WAITER CALL CARD HIGHLIGHT ── */
.order-card.waiter-call-card {
  border-color: var(--garnet) !important;
  border-width: 3px !important;
  animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1), waiterPulse 1.5s ease-in-out infinite !important;
}
@keyframes waiterPulse {
  0%,100% { box-shadow:0 0 15px rgba(155,17,30,0.3), 0 0 0 0 rgba(155,17,30,0); }
  50% { box-shadow:0 0 25px rgba(155,17,30,0.6), 0 0 0 8px rgba(155,17,30,0.1); }
}
.waiter-call-banner {
  background:linear-gradient(135deg, var(--garnet), var(--garnet-light));
  color:white; text-align:center; padding:10px;
  font-size:12px; font-weight:900; letter-spacing:3px;
  text-transform:uppercase; border-radius:14px 14px 0 0;
  margin:-18px -18px 12px -18px;
  animation:bellRing 0.5s ease-in-out infinite;
}

/* Card internals */
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.table-badge { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; color:var(--garnet); }
.table-ref { font-size:9px; letter-spacing:2px; color:var(--text-muted); margin-top:2px; }
.order-time-wrap { text-align:right; }
.order-time { font-size:11px; color:var(--text-muted); }
.timer { font-size:1rem; font-weight:700; color:var(--orange); font-family:'Lato',sans-serif; margin-top:2px; }
.timer.urgent { color:var(--garnet); animation:timerBlink 1s ease-in-out infinite; }
@keyframes timerBlink { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

.card-divider { height:1px; background:var(--border); margin:10px 0; }
.items-list { margin-bottom:10px; max-height:180px; overflow-y:auto; }
.item-row { display:flex; justify-content:space-between; align-items:baseline; padding:3px 0; }
.item-name { font-size:13px; color:var(--text); font-weight:500; flex:1; }
.item-qty {
  font-size:10px; letter-spacing:1px;
  background:rgba(204,85,0,0.08); color:var(--orange);
  border-radius:4px; padding:1px 6px; margin-right:8px; font-weight:700;
}
.item-price { font-size:12px; color:var(--text-muted); }

.note-row { font-size:11px; color:var(--garnet); font-style:italic; padding:4px 0; border-top:1px dashed var(--border); margin-top:4px; }

.card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px dashed var(--border); }
.total { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--garnet); }
.total-label { font-size:9px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }

.status-chip {
  display:flex; align-items:center; gap:6px;
  border-radius:50px; padding:5px 14px;
  font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
}
.status-chip.pending { background:var(--pending-bg); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.status-chip.preparing { background:var(--preparing-bg); color:var(--orange); border:1px solid rgba(204,85,0,0.25); }
.status-chip.ready { background:var(--ready-bg); color:var(--ready-green); border:1px solid rgba(34,139,34,0.25); }
.chip-dot { width:6px; height:6px; border-radius:50%; }
.status-chip.pending .chip-dot { background:var(--gold); box-shadow:0 0 6px var(--gold); }
.status-chip.preparing .chip-dot { background:var(--orange); box-shadow:0 0 6px var(--orange); }
.status-chip.ready .chip-dot { background:var(--ready-green); box-shadow:0 0 6px var(--ready-green); }

/* ── EMPTY STATE ── */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:calc(100vh - 200px); color:var(--text-muted); gap:16px; opacity:0.5;
}
.empty-state span { font-size:4rem; }
.empty-state p { font-size:14px; letter-spacing:3px; text-transform:uppercase; }

/* ── CONNECTING OVERLAY ── */
#connecting {
  position:fixed; inset:0; z-index:999;
  background:var(--garnet);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  transition:opacity .6s ease;
}
#connecting.hide { opacity:0; pointer-events:none; }
.connect-logo { width:100px; height:100px; border-radius:50%; background:white; padding:10px; object-fit:contain; animation:logoPulse 2s ease-in-out infinite; }
.connect-text { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--gold-light); letter-spacing:0.1em; }
.connect-dots { display:flex; gap:8px; }
.connect-dots span { width:8px; height:8px; border-radius:50%; background:var(--gold-light); animation:dotPulse 1.2s ease-in-out infinite; }
.connect-dots span:nth-child(2) { animation-delay:.2s; }
.connect-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<!-- Connecting overlay -->
<div id="connecting">
  <img class="connect-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Taj_Mahal_%28logo%29.svg/1200px-Taj_Mahal_%28logo%29.svg.png" alt="Taj Mahal" onerror="this.style.display='none'">
  <div class="connect-text">TAJ MAHAL</div>
  <div class="connect-text" style="font-size:1rem;">Connexion en cours…</div>

</div>

<!-- Waiter alert banner -->
<div class="waiter-alert" id="waiter-alert">
  <span class="waiter-icon">🔔</span>
  <div class="waiter-text">
    <h3 id="waiter-table-text">Table — Appel Serveur</h3>
    <p>UN CLIENT DEMANDE ASSISTANCE</p>
  </div>
</div>

<!-- New order toast -->
<div class="new-order-toast" id="order-toast">
  <span class="toast-icon">🍽️</span>
  <div class="toast-text">
    <strong id="toast-table-text">Nouvelle commande</strong>
    <span>Commande reçue</span>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-brand">
    <img class="header-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Taj_Mahal_%28logo%29.svg/1200px-Taj_Mahal_%28logo%29.svg.png" alt="Taj Mahal" onerror="this.style.display='none'">
    <div class="brand-text">
      <h1>TAJ MAHAL</h1>
      <p>Écran Cuisine</p>
    </div>
  </div>
  <div class="header-center">
    <div class="live-badge">
      <div class="live-dot" id="live-dot"></div>
      <span class="live-text">Commandes en Direct</span>
    </div>
    <div class="header-stats">
      <div class="stat-pill pend">
        <div class="stat-dot"></div>
        <div><div class="stat-num" id="cnt-pend">0</div><div class="stat-label">En attente</div></div>
      </div>
      <div class="stat-pill prep">
        <div class="stat-dot"></div>
        <div><div class="stat-num" id="cnt-prep">0</div><div class="stat-label">En cuisine</div></div>
      </div>
      <div class="stat-pill redy">
        <div class="stat-dot"></div>
        <div><div class="stat-num" id="cnt-redy">0</div><div class="stat-label">Prêt</div></div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div class="fb-status" id="fb-status">
      <div class="fb-dot wait" id="fb-dot"></div>
      <span class="fb-label" id="fb-label">Connexion…</span>
    </div>
    <div>
      <div class="clock" id="clock">--:--</div>
      <div class="date-line" id="date-line"></div>
    </div>
  </div>
</header>

<!-- Main orders display -->
<div class="orders-wrapper" id="orders-wrapper">
  <div class="empty-state" id="empty-state">
    <span>🍽️</span>
    <p>En attente de commandes…</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase Config ──
const firebaseConfig = {
  apiKey: "AIzaSyDTgv9mpcXTOK5m2nCXgLunCT27tZ0Gj-I",
  authDomain: "tajmahal-orders.firebaseapp.com",
  projectId: "tajmahal-orders",
  storageBucket: "tajmahal-orders.firebasestorage.app",
  messagingSenderId: "347604539540",
  appId: "1:347604539540:web:78fc0e40fa8fee5bca63c8"
};

let db = null;
let firebaseConnected = false;

try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  console.log('[Display] Firebase initialized OK');
} catch(e) {
  console.error('[Display] Firebase init FAILED:', e);
  updateFirebaseStatus('error');
}

// ── State ──
let allOrders = {};          // id -> data
let knownOrderIds = new Set();  // track what we've seen for new-order detection
let waiterCallTables = new Set(); // tables with active (answered==false) waiter calls
let waiterCallTimeout = null;

// ── Utility functions on window scope ──
window.updateClock = function() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('date-line').textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
};

window.timeAgo = function(ts) {
  if (!ts) return '--';
  let date;
  if (ts && typeof ts.toDate === 'function') {
    date = ts.toDate();
  } else if (ts instanceof Date) {
    date = ts;
  } else if (typeof ts === 'number' || typeof ts === 'string') {
    date = new Date(ts);
  } else {
    return '--';
  }
  const diff = Date.now() - date.getTime();
  if (diff < 0) return '0s';
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'À l\'instant';
  if (mins < 60) return mins + 'min';
  const hrs = Math.floor(mins / 60);
  const rm = mins % 60;
  return hrs + 'h' + (rm < 10 ? '0' : '') + rm;
};

window.isUrgent = function(ts) {
  if (!ts) return false;
  let date;
  if (ts && typeof ts.toDate === 'function') date = ts.toDate();
  else if (ts instanceof Date) date = ts;
  else date = new Date(ts);
  return (Date.now() - date.getTime()) > 20 * 60000; // 20 min
};

window.formatTime = function(ts) {
  if (!ts) return '--:--';
  let date;
  if (ts && typeof ts.toDate === 'function') date = ts.toDate();
  else if (ts instanceof Date) date = ts;
  else date = new Date(ts);
  return String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
};

window.getCreatedAt = function(data) {
  // Safely extract a sortable timestamp from the order data
  if (!data.createdAt) return 0;
  if (typeof data.createdAt.toDate === 'function') return data.createdAt.toDate().getTime();
  if (data.createdAt instanceof Date) return data.createdAt.getTime();
  if (typeof data.createdAt === 'number') return data.createdAt;
  if (typeof data.createdAt === 'string') return new Date(data.createdAt).getTime();
  // Fallback: try seconds (Firestore Timestamp)
  if (data.createdAt.seconds) return data.createdAt.seconds * 1000;
  return 0;
};

// ── Sound ──
window.playBeep = function() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // First beep
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.frequency.value = 880; osc1.type = 'sine';
    gain1.gain.setValueAtTime(0.3, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + 0.3);
    // Second beep
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.frequency.value = 1100; osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.15);
    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
    osc2.start(ctx.currentTime + 0.15); osc2.stop(ctx.currentTime + 0.45);
  } catch(e) { console.warn('[Display] Audio error:', e); }
};

window.playWaiterBeep = function() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 660; osc.type = 'square';
      const t = ctx.currentTime + i * 0.25;
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    }
  } catch(e) { console.warn('[Display] Audio error:', e); }
};

// ── Firebase Status ──
window.updateFirebaseStatus = function(state) {
  const dot = document.getElementById('fb-dot');
  const label = document.getElementById('fb-label');
  const liveDot = document.getElementById('live-dot');
  if (state === 'ok') {
    dot.className = 'fb-dot ok';
    label.textContent = 'Firebase connecté';
    liveDot.style.background = '#22C55E';
    liveDot.style.boxShadow = '0 0 10px #22C55E';
    firebaseConnected = true;
  } else if (state === 'error') {
    dot.className = 'fb-dot err';
    label.textContent = 'Erreur connexion';
    liveDot.style.background = '#EF4444';
    liveDot.style.boxShadow = '0 0 10px #EF4444';
  } else {
    dot.className = 'fb-dot wait';
    label.textContent = 'Connexion…';
  }
};

// ── Build Order Card HTML ──
window.buildCardHTML = function(id, data) {
  const table = data.table || '?';
  const items = data.items || [];
  const total = data.total || 0;
  const status = data.status || 'pending';
  const note = data.note || '';
  const created = data.createdAt;
  const hasWaiterCall = waiterCallTables.has(String(table));

  const statusLabels = { pending: 'En attente', preparing: 'En cuisine', ready: 'Prêt' };
  const statusLabel = statusLabels[status] || status;

  let itemsHTML = '';
  items.forEach(function(item) {
    itemsHTML += '<div class="item-row">' +
      '<span class="item-qty">x' + (item.qty || 1) + '</span>' +
      '<span class="item-name">' + (item.name || 'Item') + '</span>' +
      '<span class="item-price">' + ((item.price || 0).toFixed(2)) + '€</span>' +
    '</div>';
  });

  const noteHTML = note ? '<div class="note-row">📝 ' + note + '</div>' : '';

  return (hasWaiterCall ? '<div class="waiter-call-banner">🔔 APPEL SERVEUR</div>' : '') +
    '<div class="order-card ' +
      'status-' + status +
      (hasWaiterCall ? ' waiter-call-card' : '') +
      (data._isNew ? ' new-flash' : '') +
    '" id="card-' + id + '">' +
      '<div class="card-top">' +
        '<div>' +
          '<div class="table-badge">Table ' + table + '</div>' +
          '<div class="table-ref">COMMANDE</div>' +
        '</div>' +
        '<div class="order-time-wrap">' +
          '<div class="order-time">' + window.formatTime(created) + '</div>' +
          '<div class="timer' + (window.isUrgent(created) ? ' urgent' : '') + '" data-ts="' + (window.getCreatedAt(data) || '') + '">' +
            window.timeAgo(created) +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-divider"></div>' +
      '<div class="items-list">' + itemsHTML + '</div>' +
      noteHTML +
      '<div class="card-footer">' +
        '<div>' +
          '<div class="total-label">Total</div>' +
          '<div class="total">' + total.toFixed(2) + '€</div>' +
        '</div>' +
        '<div class="status-chip ' + status + '">' +
          '<div class="chip-dot"></div>' +
          statusLabel +
        '</div>' +
      '</div>' +
    '</div>';
};

// ── Render all orders ──
window.render = function() {
  const wrapper = document.getElementById('orders-wrapper');
  const emptyState = document.getElementById('empty-state');

  // Filter active orders only (pending, preparing, ready)
  const activeOrders = Object.entries(allOrders).filter(function(entry) {
    const s = entry[1].status;
    return s === 'pending' || s === 'preparing' || s === 'ready';
  });

  // Sort: newest first (descending by createdAt) — LATEST AT LEFT TOP
  activeOrders.sort(function(a, b) {
    const ta = window.getCreatedAt(a[1]);
    const tb = window.getCreatedAt(b[1]);
    return tb - ta; // newest first
  });

  // Update counters
  let cntPend = 0, cntPrep = 0, cntRedy = 0;
  activeOrders.forEach(function(entry) {
    if (entry[1].status === 'pending') cntPend++;
    else if (entry[1].status === 'preparing') cntPrep++;
    else if (entry[1].status === 'ready') cntRedy++;
  });
  document.getElementById('cnt-pend').textContent = cntPend;
  document.getElementById('cnt-prep').textContent = cntPrep;
  document.getElementById('cnt-redy').textContent = cntRedy;

  if (activeOrders.length === 0) {
    wrapper.innerHTML = '';
    wrapper.appendChild(emptyState.cloneNode ? (function() {
      const el = document.createElement('div');
      el.className = 'empty-state';
      el.innerHTML = '<span>🍽️</span><p>Aucune commande active</p>';
      return el;
    })() : emptyState);
    return;
  }

  // Group by status for sectioned display
  // Order of sections: pending first, then preparing, then ready
  const pending = activeOrders.filter(function(e) { return e[1].status === 'pending'; });
  const preparing = activeOrders.filter(function(e) { return e[1].status === 'preparing'; });
  const ready = activeOrders.filter(function(e) { return e[1].status === 'ready'; });

  let html = '';

  // Pending section
  if (pending.length > 0) {
    html += '<div class="section-header section-pending">' +
      '<div class="section-dot"></div>' +
      '<div class="section-name">En Attente</div>' +
      '<div class="section-cnt">' + pending.length + ' commande' + (pending.length > 1 ? 's' : '') + '</div>' +
    '</div>';
    html += '<div class="cards-grid">';
    pending.forEach(function(entry) { html += window.buildCardHTML(entry[0], entry[1]); });
    html += '</div>';
  }

  // Preparing section
  if (preparing.length > 0) {
    html += '<div class="section-header section-kitchen">' +
      '<div class="section-dot"></div>' +
      '<div class="section-name">En Cuisine</div>' +
      '<div class="section-cnt">' + preparing.length + ' commande' + (preparing.length > 1 ? 's' : '') + '</div>' +
    '</div>';
    html += '<div class="cards-grid">';
    preparing.forEach(function(entry) { html += window.buildCardHTML(entry[0], entry[1]); });
    html += '</div>';
  }

  // Ready section
  if (ready.length > 0) {
    html += '<div class="section-header section-ready">' +
      '<div class="section-dot"></div>' +
      '<div class="section-name">Prêt à Servir</div>' +
      '<div class="section-cnt">' + ready.length + ' commande' + (ready.length > 1 ? 's' : '') + '</div>' +
    '</div>';
    html += '<div class="cards-grid">';
    ready.forEach(function(entry) { html += window.buildCardHTML(entry[0], entry[1]); });
    html += '</div>';
  }

  wrapper.innerHTML = html;
};

// ── Update elapsed timers ──
window.updateTimers = function() {
  document.querySelectorAll('.timer[data-ts]').forEach(function(el) {
    const ts = parseInt(el.getAttribute('data-ts'));
    if (!ts) return;
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    let text;
    if (mins < 1) text = 'À l\'instant';
    else if (mins < 60) text = mins + 'min';
    else {
      const hrs = Math.floor(mins / 60);
      const rm = mins % 60;
      text = hrs + 'h' + (rm < 10 ? '0' : '') + rm;
    }
    el.textContent = text;
    // Urgent after 20 min
    if (diff > 20 * 60000) el.classList.add('urgent');
    else el.classList.remove('urgent');
  });
};

// ── Show toast for new order ──
window.showOrderToast = function(table) {
  const toast = document.getElementById('order-toast');
  document.getElementById('toast-table-text').textContent = 'Table ' + table;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 4000);
};

// ── Show waiter call alert ──
window.showWaiterAlert = function(table) {
  const alert = document.getElementById('waiter-alert');
  document.getElementById('waiter-table-text').textContent = 'TABLE ' + table + ' — APPEL SERVEUR';
  alert.classList.add('show');
  window.playWaiterBeep();
  if (waiterCallTimeout) clearTimeout(waiterCallTimeout);
  waiterCallTimeout = setTimeout(function() {
    alert.classList.remove('show');
  }, 8000);
};

// ── Start listeners ──
window.startListeners = function() {
  if (!db) {
    console.error('[Display] No db, cannot start listeners');
    updateFirebaseStatus('error');
    return;
  }

  // Listen to waiter_calls — simple collection query, filter client-side
  onSnapshot(collection(db, 'waiter_calls'), function(snap) {
    console.log('[Display] waiter_calls snapshot, docs:', snap.size);
    const prevCallTables = new Set(waiterCallTables);
    waiterCallTables.clear();

    snap.forEach(function(doc) {
      const data = doc.data();
      // Client-side filter: only unanswered calls
      if (data.answered === false) {
        const tableStr = String(data.table);
        waiterCallTables.add(tableStr);
        // New call detection
        if (!prevCallTables.has(tableStr)) {
          console.log('[Display] New waiter call for table:', data.table);
          window.showWaiterAlert(data.table);
        }
      }
    });

    // Re-render to show/hide waiter call highlights
    window.render();

  }, function(error) {
    console.error('[Display] Firestore error (waiter_calls):', error);
  });

  // Listen to orders — simple collection query, NO where/orderBy
  onSnapshot(collection(db, 'orders'), function(snap) {
    console.log('[Display] orders snapshot, docs:', snap.size);

    const newOrderIds = new Set();

    snap.forEach(function(doc) {
      const data = doc.data();
      const id = doc.id;
      newOrderIds.add(id);

      // Detect truly new orders (first time we see this id)
      if (!knownOrderIds.has(id)) {
        const status = data.status;
        if (status === 'pending' || status === 'preparing' || status === 'ready') {
          console.log('[Display] NEW order detected:', id, 'table:', data.table, 'status:', status);
          data._isNew = true;
          window.playBeep();
          window.showOrderToast(data.table);
          // Remove new-flash flag after animation
          setTimeout(function() { delete data._isNew; }, 4000);
        }
        knownOrderIds.add(id);
      }

      allOrders[id] = data;
    });

    // Remove orders that no longer exist in Firestore
    Object.keys(allOrders).forEach(function(id) {
      if (!newOrderIds.has(id)) {
        delete allOrders[id];
        knownOrderIds.delete(id);
      }
    });

    // Mark Firebase as connected on first successful snapshot
    if (!firebaseConnected) {
      updateFirebaseStatus('ok');
      // Hide connecting overlay
      const overlay = document.getElementById('connecting');
      if (overlay) overlay.classList.add('hide');
    }

    window.render();

  }, function(error) {
    console.error('[Display] Firestore error (orders):', error);
    updateFirebaseStatus('error');
  });
};

// ── Init ──
window.updateClock();
setInterval(window.updateClock, 1000);
setInterval(window.updateTimers, 5000);

// Start Firebase listeners
window.startListeners();

// Safety: hide connecting overlay after 8 seconds even if Firebase is slow
setTimeout(function() {
  const overlay = document.getElementById('connecting');
  if (overlay && !overlay.classList.contains('hide')) {
    overlay.classList.add('hide');
    if (!firebaseConnected) {
      updateFirebaseStatus('error');
    }
  }
}, 8000);

</script>
